# Local dev infrastructure (Guide §17).
# App services (api/workers/web) run via `pnpm dev` on the host for fast reload;
# their Dockerfiles are added in Phase E when we containerize for staging.
name: astronomiq

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aq
      POSTGRES_PASSWORD: aq
      POSTGRES_DB: astronomiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aq -d astronomiq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
